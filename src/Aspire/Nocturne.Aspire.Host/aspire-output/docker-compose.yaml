services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  nocturne-postgres-server:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USERNAME}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "nocturne"
      NOCTURNE_MIGRATOR_PASSWORD: "${POSTGRES_MIGRATOR_PASSWORD}"
      NOCTURNE_APP_PASSWORD: "${POSTGRES_APP_PASSWORD}"
      NOCTURNE_WEB_PASSWORD: "${POSTGRES_WEB_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "bind"
        target: "/docker-entrypoint-initdb.d"
        source: "${NOCTURNE_POSTGRES_SERVER_BINDMOUNT_0}"
        read_only: true
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "nocturne-postgres-data"
        read_only: false
    networks:
      - "aspire"
  nocturne-api:
    image: "${NOCTURNE_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      ConnectionStrings__nocturne-postgres: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_app;Password=${POSTGRES_APP_PASSWORD}"
      ConnectionStrings__nocturne-postgres-migrator: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_migrator;Password=${POSTGRES_MIGRATOR_PASSWORD}"
      DemoService__Enabled: "false"
      WEB_URL: "http://nocturne-web:8000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "nocturne-api"
    expose:
      - "${NOCTURNE_API_PORT}"
    depends_on:
      nocturne-postgres-server:
        condition: "service_started"
    networks:
      - "aspire"
  nocturne-web:
    image: "${NOCTURNE_WEB_IMAGE}"
    environment:
      PORT: "8000"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      PUBLIC_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY}"
      DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      PUBLIC_BASE_DOMAIN: "${PUBLIC_BASE_DOMAIN}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN}"
      WHATSAPP_APP_SECRET: "${WHATSAPP_APP_SECRET}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID}"
      ORIGIN: "https://${PUBLIC_BASE_DOMAIN}"
      NOCTURNE_POSTGRES_URI: "postgresql://nocturne_web:${POSTGRES_WEB_PASSWORD}@nocturne-postgres-server:5432/nocturne"
    expose:
      - "8000"
    depends_on:
      nocturne-api:
        condition: "service_started"
    networks:
      - "aspire"
  gateway:
    image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
    command:
      - "/app/yarp.dll"
    entrypoint:
      - "dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__HTTPREQUEST__ACTIVITYTIMEOUT: "00:05:00"
      REVERSEPROXY__ROUTES__route0__MATCH__PATH: "/api/v4/oidc/{**catch-all}"
      REVERSEPROXY__ROUTES__route0__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route1__MATCH__PATH: "/api/{**catch-all}"
      REVERSEPROXY__ROUTES__route1__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route2__MATCH__PATH: "/auth/bot/{**catch-all}"
      REVERSEPROXY__ROUTES__route2__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route3__MATCH__PATH: "/scalar/{**catch-all}"
      REVERSEPROXY__ROUTES__route3__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route4__MATCH__PATH: "/openapi/{**catch-all}"
      REVERSEPROXY__ROUTES__route4__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route5__MATCH__PATH: "/.well-known/{**catch-all}"
      REVERSEPROXY__ROUTES__route5__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__ROUTES__route6__MATCH__PATH: "/{**catchall}"
      REVERSEPROXY__ROUTES__route6__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__X-Forwarded: "Set"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__HeaderPrefix: "X-Forwarded"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-api__DESTINATIONS__destination1__ADDRESS: "http://_http.nocturne-api"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__DESTINATIONS__destination1__ADDRESS: "http://_http.nocturne-web"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_WEB_HTTP: "http://nocturne-web:8000"
      services__nocturne-web__http__0: "http://nocturne-web:8000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "gateway"
    ports:
      - "80:5000"
    depends_on:
      nocturne-api:
        condition: "service_started"
      nocturne-web:
        condition: "service_started"
    networks:
      - "aspire"
  scalar:
    image: "scalarapi/aspire-api-reference:0.8.0"
    environment:
      API_REFERENCE_CONFIG: ""
      CDN_URL: "scalar.js"
      ALLOW_SELF_SIGNED_CERTIFICATES: "False"
      DEFAULT_PROXY: "True"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
    expose:
      - "8080"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  nocturne-postgres-data:
    driver: "local"
